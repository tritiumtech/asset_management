server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: asset-management

  # 禁用Redis Repository自动配置（避免与MyBatis-Plus冲突）
  data:
    redis:
      repositories:
        enabled: false

  # H2 内存数据库（开发测试用，无需安装MySQL）
  datasource:
    url: jdbc:h2:mem:asset_management;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-v1.2.sql

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

logging:
  level:
    com.drv.assetmanagement: debug
    org.springframework.security: debug

jwt:
  secret: your-256-bit-secret-key-for-jwt-signing
  expiration: 86400000  # 24 hours in milliseconds

---
# 生产环境配置（使用MySQL）
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://localhost:3306/asset_management?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver